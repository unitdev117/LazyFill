<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=420, initial-scale=1.0">
  <title>LazyFill — AI Autofill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app" id="app">
    <!-- HEADER -->
    <header class="header">
      <div class="header-brand">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="url(#logo-grad)"/>
            <path d="M8 10h12M8 14h8M8 18h10" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <defs>
              <linearGradient id="logo-grad" x1="0" y1="0" x2="28" y2="28">
                <stop stop-color="#6C63FF"/>
                <stop offset="1" stop-color="#3B82F6"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="header-text">
          <h1>LazyFill</h1>
          <span class="subtitle">AI-Powered Autofill</span>
        </div>
      </div>
      <button class="icon-btn settings-btn" id="settingsToggle" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- NAVIGATION TABS -->
    <nav class="tabs" id="navTabs">
      <button class="tab active" data-tab="dashboard">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </button>
      <button class="tab" data-tab="profiles">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profiles
      </button>
      <button class="tab" data-tab="settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        API Key
      </button>
    </nav>

    <!-- TAB CONTENT -->
    <main class="content">
      <!-- ========== DASHBOARD ========== -->
      <section class="tab-panel active" id="panel-dashboard">
        <!-- Status Card -->
        <div class="status-card" id="statusCard">
          <div class="status-indicator" id="statusIndicator">
            <div class="status-dot"></div>
            <span id="statusText">Ready to scan</span>
          </div>
        </div>

        <!-- Active Profile Selector -->
        <div class="form-group">
          <label class="form-label">Active Profile</label>
          <select class="form-select" id="activeProfileSelect">
            <option value="">— Select a Profile —</option>
          </select>
        </div>

        <!-- Field Counter -->
        <div id="fieldCounter" style="text-align: center; font-size: 13px; color: #6b7280; margin-bottom: 16px;">
          Detecting fillable fields...
        </div>

        <!-- Action Buttons -->
        <div class="action-grid" style="grid-template-columns: 1fr;">
          <button class="btn btn-primary btn-scan" id="btnScan">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
              <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            Complete Auto Fill
          </button>
        </div>

        <!-- Fill Mode Toggle -->
        <div class="mode-toggle">
          <label class="toggle-label">
            <span>Auto-fill mode</span>
            <span class="toggle-hint">Fill immediately after manual scan</span>
          </label>
          <label class="switch">
            <input type="checkbox" id="autoFillToggle">
            <span class="slider"></span>
          </label>
        </div>

        <!-- Ghost Preview Toggle -->
        <div class="mode-toggle" style="margin-top: 12px;">
          <label class="toggle-label">
            <span>Always-On Ghost Preview</span>
            <span class="toggle-hint">Autonomously scan and suggest inline</span>
          </label>
          <label class="switch">
            <input type="checkbox" id="ghostPreviewToggle" checked>
            <span class="slider"></span>
          </label>
        </div>

        <!-- Toast Messages -->
        <div class="toast-container" id="toastContainer"></div>
      </section>

      <!-- ========== PROFILES ========== -->
      <section class="tab-panel" id="panel-profiles">
        <!-- Profile List -->
        <div class="profile-list" id="profileList">
          <!-- Populated dynamically -->
        </div>

        <!-- Add Profile Button -->
        <button class="btn btn-dashed" id="btnAddProfile">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add New Profile
        </button>

        <!-- Profile Editor (hidden by default) -->
        <div class="profile-editor hidden" id="profileEditor">
          <div class="editor-header">
            <h3 id="editorTitle">New Profile</h3>
            <button class="icon-btn" id="btnCloseEditor">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>

          <div class="form-group">
            <label class="form-label">Profile Name</label>
            <input type="text" class="form-input" id="profileNameInput" placeholder="e.g. Education, Travel, Work">
          </div>

          <div class="fields-section">
            <div class="fields-header">
              <label class="form-label">Profile Fields</label>
              <button class="btn btn-sm btn-ghost-btn" id="btnAddField">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Field
              </button>
            </div>
            <div class="fields-list" id="fieldsList">
              <!-- Populated dynamically -->
            </div>
          </div>

          <div class="editor-actions">
            <button class="btn btn-secondary" id="btnCancelProfile">Cancel</button>
            <button class="btn btn-primary" id="btnSaveProfile">Save Profile</button>
          </div>
        </div>
      </section>

      <!-- ========== SETTINGS / API KEY ========== -->
      <section class="tab-panel" id="panel-settings">
        <div class="settings-card">
          <div class="settings-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6C63FF" stroke-width="1.5">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <h3>Google Gemini API Key</h3>
          <p class="settings-desc">Your key is stored locally and never sent to any server except Google's API.</p>

          <div class="form-group">
            <div class="api-key-input-wrapper">
              <input type="password" class="form-input" id="apiKeyInput" placeholder="Enter your Gemini API key...">
              <button class="icon-btn eye-btn" id="toggleKeyVisibility" title="Show/Hide">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="settings-actions">
            <button class="btn btn-primary" id="btnSaveKey">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              Save Key
            </button>
            <button class="btn btn-danger" id="btnDeleteKey">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              Delete Key
            </button>
          </div>

          <div class="key-status" id="keyStatus">
            <!-- Populated dynamically -->
          </div>
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <span>LazyFill v1.0.0</span>
      <span class="footer-dot">·</span>
      <span>Powered by Gemini</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
